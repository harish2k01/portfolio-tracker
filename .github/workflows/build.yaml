name: Build Image

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-entrypoint.sh
      - package.json
      - package-lock.json
      - next.config.ts
      - postcss.config.mjs
      - prisma.config.ts
      - prisma/**
      - public/**
      - src/**
      - tsconfig.json
      - .github/workflows/build.yaml
      - .github/workflows/release.yaml

permissions:
  contents: read

jobs:
  build:
    runs-on: portfolio-tracker-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pull request image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Self-hosted portfolio tracker
